<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        .card {
            border-radius: 15px;
        }

        .title {
            font-weight: 700;
            color: #333;
        }

        .result-box {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-lg p-4 w-100" style="max-width: 600px;">

            <h2 class="text-center mb-4 title">📊 Student Performance Predictor</h2>

            <!-- ✅ FIXED FORM ACTION -->
            <form action="{{ url_for('predict') }}" method="post" id="predictionForm">

                <div class="mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-select" name="gender" required>
                        <option selected disabled value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Race or Ethnicity</label>
                    <select class="form-select" name="ethnicity" required>
                        <option selected disabled value="">Select Ethnicity</option>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Parental Education</label>
                    <select class="form-select" name="parental_level_of_education" required>
                        <option selected disabled value="">Select</option>
                        <option value="associate's degree">Associate's Degree</option>
                        <option value="bachelor's degree">Bachelor's Degree</option>
                        <option value="high school">High School</option>
                        <option value="master's degree">Master's Degree</option>
                        <option value="some college">Some College</option>
                        <option value="some high school">Some High School</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Lunch Type</label>
                    <select class="form-select" name="lunch" required>
                        <option selected disabled value="">Select</option>
                        <option value="free/reduced">Free/Reduced</option>
                        <option value="standard">Standard</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Test Preparation</label>
                    <select class="form-select" name="test_preparation_course" required>
                        <option selected disabled value="">Select</option>
                        <option value="none">None</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Reading Score (0–100)</label>
                    <input class="form-control" type="number" name="reading_score" min="0" max="100" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Writing Score (0–100)</label>
                    <input class="form-control" type="number" name="writing_score" min="0" max="100" required>
                </div>

                <!-- ✅ BUTTON WITH LOADING SPINNER -->
                <div class="d-grid">
                    <button class="btn btn-primary btn-lg" type="submit" id="submitBtn">
                        Predict Maths Score
                    </button>
                </div>

            </form>

            <!-- ✅ RESULT BOX IMPROVED -->
            {% if results is not none %}
            <div class="result-box mt-4">
                <h5>🎯 Predicted Maths Score</h5>
                <h3 class="text-primary">{{ results }}</h3>
            </div>
            {% endif %}

            <!-- ✅ BACK BUTTON -->
            <div class="text-center mt-3">
                <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm">
                    ⬅ Back to Home
                </a>
            </div>

        </div>
    </div>

    <!-- ✅ LOADING SCRIPT -->
    <script>
        const form = document.getElementById("predictionForm");
        const button = document.getElementById("submitBtn");

        form.addEventListener("submit", function () {
            button.disabled = true;
            button.innerHTML = `
                <span class="spinner-border spinner-border-sm"></span>
                Predicting...
            `;
        });
    </script>

</body>

</html>
